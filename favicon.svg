<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <!-- Coin surface: warm highlight at centre fading to deeper gold at rim -->
    <radialGradient id="coin-bg" cx="42%" cy="38%" r="58%" fx="42%" fy="38%">
      <stop offset="0%"   stop-color="#F0DF9E"/>
      <stop offset="45%"  stop-color="#C9A228"/>
      <stop offset="100%" stop-color="#8A6510"/>
    </radialGradient>

    <!-- Subtle inner sheen on the "M" so it reads as engraved -->
    <radialGradient id="letter-grad" cx="50%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#3D2E04"/>
      <stop offset="100%" stop-color="#5A4508"/>
    </radialGradient>
  </defs>

  <!-- Coin base disc -->
  <circle cx="20" cy="20" r="19.5" fill="url(#coin-bg)"/>

  <!-- Outer bezel ring -->
  <circle cx="20" cy="20" r="18.6" fill="none" stroke="#7A5E0A" stroke-width="1" opacity="0.7"/>

  <!-- Inner bezel ring -->
  <circle cx="20" cy="20" r="16.2" fill="none" stroke="#7A5E0A" stroke-width="0.7" opacity="0.45"/>

  <!-- Decorative dots at 3 & 9 o'clock -->
  <circle cx="3.2"  cy="20" r="0.9" fill="#7A5E0A" opacity="0.6"/>
  <circle cx="36.8" cy="20" r="0.9" fill="#7A5E0A" opacity="0.6"/>

  <!-- Serif "M" monogram — engraved dark tone for contrast -->
  <text
    x="20" y="29"
    text-anchor="middle"
    font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-size="26"
    font-weight="800"
    fill="url(#letter-grad)"
  >M</text>
</svg>
